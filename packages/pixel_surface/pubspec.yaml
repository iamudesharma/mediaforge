name: pixel_surface
resolution: workspace
description: >
  Flutter GPU texture runtime — TextureRegistry bridge, CVPixelBuffer /
  SurfaceTexture upload, and GpuTextureView. No editor, filters, or beauty.
version: 1.0.0
homepage: https://github.com/iamudesharma/mediaforge
repository: https://github.com/iamudesharma/mediaforge

environment:
  sdk: ^3.12.0
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.pixel_surface
        pluginClass: RustGpuTexturePlugin
      ios:
        pluginClass: RustGpuTexturePlugin
      macos:
        pluginClass: RustGpuTexturePlugin
