name: rust_gpu_texture
resolution: workspace
description: >
  Flutter GPU texture runtime — TextureRegistry bridge, CVPixelBuffer /
  SurfaceTexture upload, and GpuTextureView. No editor, filters, or beauty.
version: 0.1.0
homepage: https://github.com/iamudesharma/rust_image
repository: https://github.com/iamudesharma/rust_image

environment:
  sdk: ^3.12.0
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.rust_gpu_texture
        pluginClass: RustGpuTexturePlugin
      ios:
        pluginClass: RustGpuTexturePlugin
      macos:
        pluginClass: RustGpuTexturePlugin
