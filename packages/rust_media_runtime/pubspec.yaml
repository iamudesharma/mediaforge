name: rust_media_runtime
resolution: workspace
description: >
  Rust media playback runtime (FFI) plus optional Flutter presentation widgets
  (GPU texture hot path via rust_gpu_texture).
version: 0.1.0
homepage: https://github.com/iamudesharma/rust_image
repository: https://github.com/iamudesharma/rust_image

environment:
  sdk: ^3.12.0
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.12.0
  rust_gpu_texture:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hooks: ^1.0.3
  code_assets: ^1.0.0
  path: ^1.9.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      windows:
        ffiPlugin: true
