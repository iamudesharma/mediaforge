[package]
name = "video_forge"
version = "1.0.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Rust video processing engine for video_forge (Flutter FFmpeg plugin)"

[lib]
crate-type = ["cdylib", "staticlib", "rlib"]
name = "video_forge"

[[bin]]
name = "vp_compress"
path = "src/bin/vp_compress.rs"

[features]
default = []
# Link against FFMPEG_DIR (minimal LGPL build from tools/ffmpeg/)
bundled-ffmpeg = []

[dependencies]
anyhow.workspace = true
thiserror.workspace = true
tokio.workspace = true
uuid.workspace = true
parking_lot.workspace = true
mp4parse.workspace = true
memmap2.workspace = true
flutter_rust_bridge = "=2.12.0"
ffmpeg-next.workspace = true
log.workspace = true
env_logger.workspace = true
image.workspace = true
serde.workspace = true
serde_json.workspace = true
rayon.workspace = true
fast_image_resize.workspace = true

[target.'cfg(target_os = "android")'.dependencies]
jni = "0.21"

[[bin]]
name = "vp_bench"
path = "src/bin/vp_bench.rs"

[build-dependencies]
pkg-config = "0.3"

[dev-dependencies]
tempfile = "3.14"
