name: video_forge
resolution: workspace
description: >
  High-performance Rust video processing engine for Flutter.
  Hardware-accelerated video transcoding, frame-accurate previews, audio mixing, and fast thumbnail generation powered by FFmpeg.
  Low-level engine. For a higher-level SDK with job queues, presets, and cached thumbnails,
  use `video_forge_kit` instead.
version: 2.1.0
homepage: https://github.com/iamudesharma/mediaforge
repository: https://github.com/iamudesharma/mediaforge
issue_tracker: https://github.com/iamudesharma/mediaforge/issues

topics:
  - video
  - video-processing
  - ffmpeg
  - compression
  - flutter

environment:
  sdk: ^3.12.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: ^2.12.0
  freezed_annotation: ^3.0.0
  hooks: ^1.0.3
  code_assets: ^1.0.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
