name: image_forge
resolution: workspace
description: >
  Full-featured GPU-accelerated Rust image processing engine for Flutter.
  Supports filters, face beauty, layer composition, presets, and multi-format encoding.
version: 1.0.0
homepage: https://github.com/iamudesharma/mediaforge
repository: https://github.com/iamudesharma/mediaforge
issue_tracker: https://github.com/iamudesharma/mediaforge/issues

topics:
  - image
  - image-processing
  - gpu
  - ffi
  - flutter

environment:
  sdk: ^3.12.0
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: ^2.12.0
  freezed_annotation: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: 3.2.5
  build_runner: ^2.15.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
        package: com.flutter_rust_bridge.image_forge
        pluginClass: RustImageCorePlugin
      ios:
        ffiPlugin: true
        pluginClass: RustImageCorePlugin
      macos:
        ffiPlugin: true
        pluginClass: RustImageCorePlugin
      linux:
        ffiPlugin: true
      windows:
        ffiPlugin: true
