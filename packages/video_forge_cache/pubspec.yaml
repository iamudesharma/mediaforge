name: video_forge_cache
resolution: workspace
publish_to: 'none'
description: >
  Optional disk LRU cache for video thumbnails (filmstrip UIs).
  Depends on video_forge for encode-on-miss.
version: 0.2.0
homepage: https://github.com/iamudesharma/mediaforge
repository: https://github.com/iamudesharma/mediaforge

environment:
  sdk: ^3.12.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.12.0
  video_forge:
    path: ../video_forge
  crypto: ^3.0.6
  path: ^1.9.0
  path_provider: ^2.1.5
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
