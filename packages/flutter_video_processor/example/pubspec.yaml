name: flutter_video_processor_example
resolution: workspace
description: Example app for flutter_video_processor
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.12.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_video_processor:
    path: ..
  file_picker: ^8.3.7
  path: ^1.9.0
  path_provider: ^2.1.5
  uuid: ^4.5.1
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
