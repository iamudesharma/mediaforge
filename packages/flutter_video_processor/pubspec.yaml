name: flutter_video_processor
resolution: workspace
description: >
  High-performance cross-platform video processing for Flutter — compress,
  transcode, thumbnails, and job queue. Native engine in video_processor_core.
version: 0.2.0
publish_to: none
homepage: https://github.com/iamudesharma/rust_image
repository: https://github.com/iamudesharma/rust_image

environment:
  sdk: ^3.12.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  rust_gpu_texture:
    path: ../rust_gpu_texture
  video_processor_core:
    path: ../video_processor_core
  video_thumbnail_cache:
    path: ../video_thumbnail_cache

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        default_package: video_processor_core
      ios:
        default_package: video_processor_core
      linux:
        default_package: video_processor_core
      macos:
        default_package: video_processor_core
      windows:
        default_package: video_processor_core
