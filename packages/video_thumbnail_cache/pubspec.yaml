name: video_thumbnail_cache
resolution: workspace
description: >
  Optional disk LRU cache for video thumbnails (filmstrip UIs).
  Depends on video_processor_core for encode-on-miss.
version: 0.2.0
homepage: https://github.com/iamudesharma/rust_image
repository: https://github.com/iamudesharma/rust_image

environment:
  sdk: ^3.12.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  video_processor_core:
    path: ../video_processor_core
  crypto: ^3.0.6
  path: ^1.9.0
  path_provider: ^2.1.5
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
