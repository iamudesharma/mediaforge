name: rust_image_workspace
publish_to: none
description: Monorepo for rust_image and flutter_video_processor packages.

environment:
  sdk: ^3.12.0

workspace:
  - rust_image
  - rust_image/example
  - packages/rust_image_editor
  - packages/rust_image_core
  - packages/rust_gpu_texture
  - packages/rust_gpu_texture/example
  - packages/rust_camera_runtime
  - packages/rust_image_core/example
  - packages/video_processor_core
  - packages/video_processor_core/example
  - packages/flutter_video_processor
  - packages/flutter_video_processor/example
  - packages/video_thumbnail_cache
  - packages/rust_media_runtime
  - packages/rust_media_runtime/example
  - examples/media_studio

dev_dependencies:
  melos: ^7.8.0

melos:
  scripts:
    analyze:
      run: flutter analyze --no-fatal-infos
      exec:
        concurrency: 2
      packageFilters:
        dirExists: lib
    test:
      run: flutter test
      exec:
        concurrency: 1
      packageFilters:
        dirExists: test
