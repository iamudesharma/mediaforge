name: media_forge_workspace
publish_to: none
description: Monorepo for image_forge, video_forge, and pixel_surface packages.

environment:
  sdk: ^3.12.0

workspace:
  - packages/image_forge_editor
  - packages/image_forge
  - packages/image_forge_core
  - packages/image_forge_core/example
  - packages/pixel_surface
  - packages/pixel_surface/example
  - packages/image_forge_camera
  - packages/image_forge/example
  - packages/video_forge
  - packages/video_forge/example
  - packages/video_forge_kit
  - packages/video_forge_kit/example
  - packages/video_forge_cache
  - packages/media_forge
  - packages/media_forge/example
  - examples/media_studio
  - examples/image_editor
  - benchmark

dev_dependencies:
  melos: ^7.8.0

melos:
  scripts:
    analyze:
      run: flutter analyze --no-fatal-infos
      exec:
        concurrency: 2
      packageFilters:
        dirExists: lib
    test:
      run: flutter test
      exec:
        concurrency: 1
      packageFilters:
        dirExists: test
