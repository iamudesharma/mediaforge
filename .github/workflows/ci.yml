name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  melos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Bootstrap workspace
        run: |
          dart pub get
          dart run melos bootstrap

      - name: Analyze pixel_surface
        run: dart run melos exec --scope=pixel_surface -- flutter analyze --no-fatal-infos

      - name: Test pixel_surface
        run: dart run melos exec --scope=pixel_surface -- flutter test

      - name: Analyze image_forge
        run: dart run melos exec --scope=image_forge -- flutter analyze --no-fatal-infos

      - name: Analyze image_forge_camera
        run: dart run melos exec --scope=image_forge_camera -- flutter analyze --no-fatal-infos

      - name: Test image_forge_camera
        run: dart run melos exec --scope=image_forge_camera -- flutter test

      - name: Analyze image_forge_editor
        run: dart run melos exec --scope=image_forge_editor -- flutter analyze lib test --no-fatal-infos --no-fatal-warnings

      - name: Test image_forge_editor
        run: dart run melos exec --scope=image_forge_editor -- flutter test

      - name: Analyze video_forge
        run: dart run melos exec --scope=video_forge -- flutter analyze --no-fatal-infos

      - name: Test video_forge
        run: dart run melos exec --scope=video_forge -- flutter test

      - name: Test video_forge_kit
        run: dart run melos exec --scope=video_forge_kit -- flutter test

      - name: Test video_forge_cache
        run: dart run melos exec --scope=video_forge_cache -- flutter test

      - name: Install FFmpeg (Rust video_forge)
        run: sudo apt-get update && sudo apt-get install -y libavcodec-dev libavformat-dev libavfilter-dev libavutil-dev libswscale-dev libswresample-dev libavdevice-dev

      - name: Rust video_forge
        run: cd packages/video_forge && cargo test -p video_forge
